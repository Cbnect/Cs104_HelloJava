<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>E-Sports Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto bg-white p-6 rounded shadow">
        <h1 class="text-2xl font-bold mb-6">E-Sports Team Manager</h1>
        
        <form action="{{ url_for('add') }}" method="post" class="mb-8 p-4 bg-blue-50 rounded">
            <h2 class="font-semibold mb-2">เพิ่มนักแข่งใหม่</h2>
            <input type="text" name="name" placeholder="ชื่อ (IGN)" required class="border p-2 mr-2">
            <input type="text" name="role" placeholder="ตำแหน่ง" required class="border p-2 mr-2">
            <select name="team_id" class="border p-2 mr-2">
                {% for team in teams %}
                    <option value="{{ team['team_id'] }}">{{ team['team_name'] }}</option>
                {% endfor %}
            </select>
            <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded">เพิ่มข้อมูล</button>
        </form>

        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-gray-200">
                    <th class="border p-2">ID</th>
                    <th class="border p-2">ชื่อนักแข่ง</th>
                    <th class="border p-2">ตำแหน่ง</th>
                    <th class="border p-2">ทีมสังกัด</th>
                    <th class="border p-2">จัดการ</th>
                </tr>
            </thead>
            <tbody>
                {% for player in players %}
                <tr>
                    <td class="border p-2">{{ player['player_id'] }}</td>
                    <td class="border p-2">{{ player['player_name'] }}</td>
                    <td class="border p-2">{{ player['role'] }}</td>
                    <td class="border p-2">{{ player['team_name'] }}</td>
                    <td class="border p-2">
                        <form action="{{ url_for('delete', id=player['player_id']) }}" method="post" class="inline">
                            <button type="submit" class="text-red-500 hover:underline">ลบ</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
