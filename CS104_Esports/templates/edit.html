<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แก้ไขข้อมูลนักแข่ง</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; }
    </style>
</head>
<body class="bg-[#FBF9F6] text-stone-800 min-h-screen flex items-center justify-center p-6 selection:bg-stone-300">
    <div class="max-w-md w-full bg-white p-10 rounded-3xl shadow-sm border border-stone-100 transform transition-all hover:shadow-lg">
        
        <div class="text-center mb-8">
            <span class="inline-block bg-stone-100 text-stone-600 p-3 rounded-full mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
            </span>
            <h1 class="text-2xl font-bold text-stone-800">แก้ไขข้อมูลนักแข่ง</h1>
            <p class="text-stone-500 text-sm mt-1">ID: {{ player['player_id'] }}</p>
        </div>
        
        <form action="{{ url_for('edit', id=player['player_id']) }}" method="POST" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-stone-600 mb-1 ml-1">ชื่อในเกม (IGN)</label>
                <input type="text" name="name" value="{{ player['player_name'] }}" required 
                    class="w-full bg-[#F8F7F4] border border-stone-200 text-stone-800 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-stone-400 transition-all">
            </div>

            <div>
                <label class="block text-sm font-medium text-stone-600 mb-1 ml-1">ตำแหน่ง (Role)</label>
                <input type="text" name="role" value="{{ player['role'] }}" required 
                    class="w-full bg-[#F8F7F4] border border-stone-200 text-stone-800 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-stone-400 transition-all">
            </div>

            <div>
                <label class="block text-sm font-medium text-stone-600 mb-1 ml-1">สังกัดทีม</label>
                <select name="team_id" class="w-full bg-[#F8F7F4] border border-stone-200 text-stone-800 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-stone-400 transition-all cursor-pointer">
                    {% for team in teams %}
                        <option value="{{ team['team_id'] }}" {% if team['team_id'] == player['team_id'] %}selected{% endif %}>
                            {{ team['team_name'] }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="pt-6 flex flex-col sm:flex-row gap-3">
                <button type="submit" 
                    class="flex-1 bg-stone-800 hover:bg-stone-900 text-white font-medium py-3 px-4 rounded-xl transition duration-300 shadow-md hover:shadow-lg">
                    บันทึกการเปลี่ยนแปลง
                </button>
                <a href="{{ url_for('index') }}" 
                    class="flex-1 bg-white border-2 border-stone-200 hover:border-stone-300 text-stone-600 hover:text-stone-800 text-center font-medium py-3 px-4 rounded-xl transition duration-300">
                    ยกเลิก
                </a>
            </div>
        </form>
    </div>
</body>
</html>
